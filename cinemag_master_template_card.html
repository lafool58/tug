<!-- TUG CineMag: 영화 카드 마크업 마스터 템플릿 (CineMag Master Template Card) -->

<!-- 
================================================================================
[TUG 핵심 비주얼 규정 및 가이드라인 - 필독]
================================================================================
⚠️ 중요 규정 (CRITICAL RULES):
  1. 절대 AI 생성 이미지(AI-generated images)나 제네릭 템플릿 이미지를 사용하지 마십시오.
     - 반드시 공식 수입/배급사에서 정식 배포한 초고화질 보도스틸, 현장 사진, 오피셜 포스터 등 검증된 실물 파일만 사용하십시오.
  2. 세로형 포스터(src)와 가로형 백드롭(data-backdrop)을 물리적/경로적으로 엄격히 분리하십시오.
     - 배경 백드롭({{MOVIE_BACKDROP_URL}}): 16:9 가로형 초고화질 공식 스틸 또는 시네마틱 월페이퍼 사용.
     - 전경 포스터({{MOVIE_POSTER_URL}}): 2:3 세로형 정통 단일 메인 공식 포스터 사용.
     - 두 속성에 동일한 세로 포스터 파일을 중복 연결하면 배너 화면에서 겹치거나 찢어지는 심각한 비주얼 깨짐 오류가 발생합니다.
  3. 극장 영화와 OTT 단독 영화의 플랫폼 배지 형식을 엄격히 구분하여 적용하십시오.
     - 극장 개봉 영화: IMAX, Dolby Cinema, 4DX 등 정식 극장관 배지군 사용.
     - OTT 단독 영화: NETFLIX, UHD 4K, Dolby Atmos 등 홈 비디오 배지군 사용.
     - 제네릭 텍스트(예: 2K/4K, 한국어 등)의 혼용을 금합니다.

[PC용 영화 카드 템플릿 - index.html 반영용]
================================================================================
- 아래 HTML 블록을 복사하여 index.html의 <div class="magazine-grid" id="movieGrid"> 내부 알맞은 순서에 삽입하십시오.
- 중괄호 {{ }} 플레이스홀더를 신규 등록할 영화 정보로 치환하십시오.
- data-reg-order의 경우, 직전 영화 카드의 순번 + 1로 순차 설정하십시오.
-->
<!-- Card: {{MOVIE_TITLE}} -->
<div class="movie-card" data-movie-key="{{MOVIE_KEY}}" 
     data-reg-order="{{REG_ORDER}}"
     data-title="{{MOVIE_TITLE}} ({{MOVIE_TITLE_EN}})" 
     data-director="{{MOVIE_DIRECTOR}}" 
     data-genre="{{MOVIE_GENRE}}" 
     data-score="{{MOVIE_SCORE}}" 
     data-year="{{MOVIE_YEAR}}" 
     data-link="{{MOVIE_LINK_HTML}}"
     data-meta="{{MOVIE_DIRECTOR}} 감독 • {{MOVIE_CAST}} 주연 • {{MOVIE_AGE_RATING}}"
     data-desc="{{MOVIE_DESCRIPTION}}"
     data-backdrop="{{MOVIE_BACKDROP_URL}}"
     data-backdrop-gradient="linear-gradient(135deg, #0c0f12 0%, #101626 50%, #1e1136 100%)"
     onclick="location.href='{{MOVIE_LINK_HTML}}'">
    <div class="card-image-wrapper">
        <img class="card-image" src="{{MOVIE_POSTER_URL}}" alt="{{MOVIE_TITLE}}">
    </div>
    <div class="card-info">
        <div class="card-badges">
            <span class="card-badge-special special-imax">IMAX</span>
            <span class="card-badge-special special-dolby">Dolby</span>
            <span class="card-badge-special special-4dx">4DX</span>
        </div>
        <h3 class="card-title">{{MOVIE_TITLE}} ({{MOVIE_YEAR}})</h3>
        <p class="card-meta">{{MOVIE_DIRECTOR}} 감독 • {{MOVIE_CAST}} 주연</p>
        <div class="card-spacer"></div>
        <div class="my-rating-row"></div>
        <div class="card-rating-row">
            <span class="card-stars">★★★★☆</span>
            <span class="card-score">★ <span class="card-score-accent">{{MOVIE_SCORE}}</span>/10</span>
        </div>
    </div>
</div>


<!-- 
================================================================================
[모바일용 영화 카드 템플릿 - index_m.html 반영용]
================================================================================
- 아래 HTML 블록을 복사하여 index_m.html의 <div class="magazine-m-list" id="movieGrid"> 내부 알맞은 순서에 삽입하십시오.
- 중괄호 {{ }} 플레이스홀더를 신규 등록할 영화 정보로 치환하십시오.
-->
<!-- Card: {{MOVIE_TITLE}} (Mobile) -->
<a href="{{MOVIE_LINK_M_HTML}}" class="movie-card" data-movie-key="{{MOVIE_KEY}}" 
   data-title="{{MOVIE_TITLE}} ({{MOVIE_TITLE_EN}})" 
   data-director="{{MOVIE_DIRECTOR}}" 
   data-genre="{{MOVIE_GENRE}}" 
   data-score="{{MOVIE_SCORE}}" 
   data-year="{{MOVIE_YEAR}}" 
   data-backdrop="{{MOVIE_BACKDROP_URL}}">
    <div class="card-image-wrapper">
        <img class="card-image" src="{{MOVIE_POSTER_URL}}" alt="{{MOVIE_TITLE}}">
    </div>
    <div class="card-info">
        <h3 class="card-title">{{MOVIE_TITLE}}</h3>
        <p class="card-meta">{{MOVIE_DIRECTOR}} 감독 • {{MOVIE_CAST}} 주연</p>
        <div class="card-badges">
            <span class="card-badge-special special-imax">IMAX</span>
            <span class="card-badge-special special-dolby">Dolby</span>
            <span class="card-badge-special special-4dx">4DX</span>
        </div>
        <div class="card-rating-row">
            <span class="card-score">★ <span class="card-score-accent">{{MOVIE_SCORE}}</span></span>
        </div>
        <div class="my-rating-row"></div>
    </div>
</a>
